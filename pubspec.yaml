name: hermes_mobile
description: Hermes Agent — AI assistant on your phone, powered by Termux.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+1
  animate_do: ^3.3.4

  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logging: ^1.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
